<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Glow AI Assistant UI</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0" />
    <link href="https://fonts.googleapis.com/googleapis/css2?family=Noto+Sans+KR:wght@300;400;500;700&display=swap" rel="stylesheet">
</head>
<body>

    <div class="bg-glow bg-glow-1"></div>
    <div class="bg-glow bg-glow-2"></div>

    <nav class="navbar">
        <div class="logo">AI Assistant</div> <div class="nav-right">
            <button class="upgrade-btn">프리미엄 요금제로 업그레이드</button>
            <div class="profile-icon">USER</div>
        </div>
    </nav>

    <main class="container">
        <header class="greeting-section">
            <h1>사용자님, 안녕하세요</h1>
            <p>계획, 학습, 아이디어 실현 등 다양한 작업을 도와드리겠습니다.</p>
        </header>

        <section class="input-area">
            <div class="search-box">
                <input type="text" placeholder="AI에게 무엇이든 물어보세요...">
                <div class="input-tools">
                    <div class="left-tools">
                        <span class="material-symbols-outlined icon-btn">add</span>
                        <span class="material-symbols-outlined icon-btn">tune</span>
                        <span class="tool-text">고급 도구</span>
                    </div>
                    <div class="right-tools">
                        <select class="model-selector">
                            <option>빠른 모델</option>
                            <option>창의적인 모델</option>
                        </select>
                        <span class="material-symbols-outlined icon-btn">mic</span>
                    </div>
                </div>
            </div>
        </section>

        <section class="quick-chips">
            <button class="chip"><span class="chip-icon">🖼️</span> 이미지 생성</button>
            <button class="chip"><span class="chip-icon">🎵</span> 음악 작곡</button>
            <button class="chip">아이디어 브레인스토밍</button>
            <button class="chip">텍스트 요약 및 작성</button>
            <button class="chip">학습 가이드</button>
        </section>

        <footer class="info-banner">
            <div class="banner-content">
                <h3>당신의 전용 AI 어시스턴트가 대기 중입니다</h3>
                <p>본 서비스는 서비스 약관 및 개인정보처리방침에 따라 운영됩니다. 개인정보 보호를 위해 민감한 정보는 입력하지 않도록 주의해 주세요. AI의 답변은 참고용이며 완벽하지 않을 수 있습니다.</p>
            </div>
            <button class="close-btn">×</button>
        </footer>
    </main>

</body>
</html>
