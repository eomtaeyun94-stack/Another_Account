<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Lab - Vertex AI</title>
    <link rel="stylesheet" href="index.css">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0" />
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700&display=swap" rel="stylesheet">
</head>
<body>

    <div class="bg-glow bg-glow-1"></div>
    <div class="bg-glow bg-glow-2"></div>

    <nav class="navbar">
        <div class="logo">AI Lab</div>
        <div class="nav-right">
            <button class="upgrade-btn">프리미엄 업그레이드</button>
            <div class="profile-icon">사용자</div>
        </div>
    </nav>

    <main class="container">
        <header class="greeting-section" id="greeting-area">
            <h1>사용자님, 안녕하세요</h1>
            <p>오늘 어떤 작업을 도와드릴까요?</p>
        </header>

        <div id="chat-display" class="chat-display"></div>

        <section class="input-area">
            <div class="search-box">
                <input type="text" id="user-input" placeholder="무엇이든 물어보세요..." autocomplete="off">
                <div class="input-tools">
                    <div class="left-tools">
                        <span class="material-symbols-outlined icon-btn">add</span>
                        <span class="material-symbols-outlined icon-btn">tune</span>
                    </div>
                    <div class="right-tools">
                        <select class="model-selector">
                            <option>VERTEX 1.0</option>
                        </select>
                        <span class="material-symbols-outlined icon-btn" id="send-btn">send</span>
                    </div>
                </div>
            </div>
        </section>

        <section class="quick-chips" id="quick-chips">
            <button class="chip">🖼️ 이미지 생성</button>
            <button class="chip">🎵 음악 작곡</button>
            <button class="chip">글 요약하기</button>
        </section>
    </main>

    <script src="index.js"></script>
</body>
</html>
