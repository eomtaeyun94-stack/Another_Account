<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Birthday Cash Roulette</title>
    <style>
        body {
            background-color: #131314;
            color: #e3e3e3;
            font-family: 'Pretendard', sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
        }

        /* 전체적인 크기 축소 */
        .header-section {
            text-align: center;
            margin-bottom: 30px;
        }

        .title {
            font-size: 2.2rem; /* 크기 축소 */
            font-weight: 700;
            margin: 0 0 10px 0;
            background: linear-gradient(90deg, #4285f4, #9b72cb, #d96570);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .subtitle {
            font-size: 0.95rem; /* 크기 축소 */
            color: #c4c7c5;
            margin: 0;
            font-weight: 300;
        }

        .roulette-wrapper {
            display: flex;
            align-items: center;
            gap: 8px; /* 간격 축소 */
            margin-bottom: 40px;
        }

        .slot {
            width: 55px; /* 75px -> 55px */
            height: 80px; /* 110px -> 80px */
            background: #1e1f20;
            border: 1px solid #444746;
            border-radius: 12px;
            overflow: hidden;
            position: relative;
            box-shadow: 0 8px 30px rgba(0,0,0,0.6);
        }

        .slot-inner {
            position: absolute;
            top: 0;
            width: 100%;
        }

        .num {
            height: 80px; /* 슬롯 높이와 동일하게 */
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2.8rem; /* 4rem -> 2.8rem */
            font-weight: 800;
            color: #8ab4f8;
        }

        .unit {
            font-size: 1.5rem; /* 크기 축소 */
            font-weight: 600;
            color: #e3e3e3;
            margin-left: 5px;
        }

        #drawBtn {
            padding: 15px 50px; /* 패딩 축소 */
            font-size: 1.1rem;
            border-radius: 50px;
            border: none;
            background: #ffffff;
            color: #131314;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.2, 0.8, 0.2, 1);
            box-shadow: 0 0 20px rgba(138, 180, 248, 0.2);
        }

        #drawBtn:hover {
            transform: scale(1.05);
            box-shadow: 0 0 35px rgba(138, 180, 248, 0.4);
        }

        #drawBtn:disabled {
            background: #444746;
            color: #888;
            cursor: not-allowed;
            transform: none;
            box-shadow: none;
        }
    </style>
</head>
<body>

    <div class="header-section">
        <h1 class="title">생일 축하합니다</h1>
        <p class="subtitle">아래 뽑기 시작 버튼을 통해 돈을 뽑아보세요</p>
    </div>

    <div class="roulette-wrapper">
        <div class="slot"><div id="s1" class="slot-inner"></div></div>
        <div class="slot"><div id="s2" class="slot-inner"></div></div>
        <div class="slot"><div id="s3" class="slot-inner"></div></div>
        <div class="slot"><div id="s4" class="slot-inner"></div></div>
        <div class="slot"><div id="s5" class="slot-inner"></div></div>
        <span class="unit">원</span>
    </div>

    <button id="drawBtn">뽑기 시작</button>

    <script>
        const slots = [
            document.getElementById('s1'),
            document.getElementById('s2'),
            document.getElementById('s3'),
            document.getElementById('s4'),
            document.getElementById('s5')
        ];
        const btn = document.getElementById('drawBtn');
        const slotHeight = 80; // 변경된 슬롯 높이

        slots.forEach(slot => {
            let nums = "";
            for (let i = 0; i < 70; i++) {
                nums += `<div class="num">${i % 10}</div>`;
            }
            slot.innerHTML = nums;
        });

        function spin() {
            btn.disabled = true;

            const isJackpot = Math.random() < 0.001; 
            let resultAmount;
            
            if (isJackpot) {
                resultAmount = "10004";
            } else {
                const randomNormal = Math.floor(Math.random() * (1999 - 1004 + 1)) + 1004;
                resultAmount = randomNormal.toString().padStart(5, '0');
            }

            const resultArr = resultAmount.split("");

            resultArr.forEach((digit, index) => {
                setTimeout(() => {
                    const targetDigit = parseInt(digit);
                    const finalPosition = -((50 + targetDigit) * slotHeight);
                    
                    slots[index].style.transition = `transform ${2.5 + index * 0.7}s cubic-bezier(0.1, 0.45, 0.1, 1)`;
                    slots[index].style.transform = `translateY(${finalPosition}px)`;
                }, index * 450);
            });

            setTimeout(() => {
                const displayWon = parseInt(resultAmount).toLocaleString();
                alert(`축하합니다! ${displayWon}원에 당첨되셨습니다!`);
            }, 6500);
        }

        btn.addEventListener('click', spin);
    </script>
</body>
</html>
