<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🎉 생일룰렛 🎉</title>

<style>
body{
    margin:0;
    font-family: 'Segoe UI', sans-serif;
    background: linear-gradient(135deg,#ff9a9e,#fad0c4);
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
    height:100vh;
    color:white;
}

h1{
    margin-bottom:20px;
}

#wheel{
    width:300px;
    height:300px;
    border-radius:50%;
    border:8px solid white;
    position:relative;
    overflow:hidden;
    transition: transform 4s ease-out;
}

/* 두 칸 */
.slice{
    position:absolute;
    width:100%;
    height:100%;
    clip-path: polygon(50% 50%, 100% 0%, 100% 100%);
}

.slice1{
    background:#ff6b6b;
    transform: rotate(0deg);
}

.slice2{
    background:#4ecdc4;
    transform: rotate(180deg);
}

#pointer{
    width:0;
    height:0;
    border-left:15px solid transparent;
    border-right:15px solid transparent;
    border-bottom:30px solid white;
    margin-bottom:-10px;
}

button{
    margin-top:20px;
    padding:10px 20px;
    font-size:18px;
    border:none;
    border-radius:10px;
    background:white;
    color:#ff6b6b;
    cursor:pointer;
}

#result{
    margin-top:20px;
    font-size:22px;
}
</style>
</head>

<body>

<h1>🎉 생일룰렛 🎉</h1>

<div id="pointer"></div>

<div id="wheel">
    <div class="slice slice1"></div>
    <div class="slice slice2"></div>
</div>

<button onclick="spin()">돌리기 🎯</button>

<div id="result"></div>

<script>
let spinning = false;

function spin(){
    if(spinning) return;
    spinning = true;

    const wheel = document.getElementById("wheel");
    const resultText = document.getElementById("result");

    // 🔥 확률 계산
    let rand = Math.random() * 100;
    let result, targetAngle;

    if(rand < 0.1){
        // 0.1%
        result = "🎉 10004원 당첨!!";
        targetAngle = 90; // slice1
    } else {
        // 99.9%
        result = "🙂 1004원";
        targetAngle = 270; // slice2
    }

    // 회전값
    let spinAngle = 360 * 6 + targetAngle;

    wheel.style.transform = `rotate(${spinAngle}deg)`;

    setTimeout(()=>{
        resultText.innerText = result;
        spinning = false;
    },4000);
}
</script>

</body>
</html>
