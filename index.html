<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Birthday Cash Roulette</title>
    <style>
        body {
            background-color: #131314;
            color: #e3e3e3;
            font-family: 'Pretendard', sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
        }

        .header-section {
            text-align: center;
            margin-bottom: 30px;
        }

        .title {
            font-size: 2.2rem;
            font-weight: 700;
            margin: 0 0 10px 0;
            background: linear-gradient(90deg, #4285f4, #9b72cb, #d96570);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .subtitle {
            font-size: 0.95rem;
            color: #c4c7c5;
            margin: 0;
            font-weight: 300;
        }

        .roulette-wrapper {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 40px;
        }

        .slot {
            width: 55px;
            height: 80px;
            background: #1e1f20;
            border: 1px solid #444746;
            border-radius: 12px;
            overflow: hidden;
            position: relative;
            box-shadow: 0 8px 30px rgba(0,0,0,0.6);
        }

        .slot-inner {
            position: absolute;
            top: 0;
            width: 100%;
            transition: transform 0s; /* 초기화용 */
        }

        .num {
            height: 80px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2.8rem;
            font-weight: 800;
            color: #8ab4f8;
        }

        .unit {
            font-size: 1.5rem;
            font-weight: 600;
            color: #e3e3e3;
            margin-left: 5px;
        }

        #drawBtn {
            padding: 15px 50px;
            font-size: 1.1rem;
            border-radius: 50px;
            border: none;
            background: #ffffff;
            color: #131314;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.2, 0.8, 0.2, 1);
            box-shadow: 0 0 20px rgba(138, 180, 248, 0.2);
        }

        #drawBtn:hover {
            transform: scale(1.05);
            box-shadow: 0 0 35px rgba(138, 180, 248, 0.4);
        }

        #drawBtn:disabled {
            background: #444746;
            color: #888;
            cursor: not-allowed;
            transform: none;
            box-shadow: none;
        }
    </style>
</head>
<body>

    <div class="header-section">
        <h1 class="title">생일 축하합니다</h1>
        <p class="subtitle">아래 뽑기 시작 버튼을 통해 돈을 뽑아보세요</p>
    </div>

    <div class="roulette-wrapper">
        <div class="slot"><div id="s1" class="slot-inner"></div></div>
        <div class="slot"><div id="s2" class="slot-inner"></div></div>
        <div class="slot"><div id="s3" class="slot-inner"></div></div>
        <div class="slot"><div id="s4" class="slot-inner"></div></div>
        <div class="slot"><div id="s5" class="slot-inner"></div></div>
        <span class="unit">원</span>
    </div>

    <button id="drawBtn">뽑기 시작</button>

    <script>
        const slots = [
            document.getElementById('s1'),
            document.getElementById('s2'),
            document.getElementById('s3'),
            document.getElementById('s4'),
            document.getElementById('s5')
        ];
        const btn = document.getElementById('drawBtn');
        const slotHeight = 80;

        // 슬롯에 숫자 채우기 (연속적인 회전 효과를 위해 숫자 반복)
        slots.forEach(slot => {
            let nums = "";
            for (let i = 0; i < 70; i++) {
                nums += `<div class="num">${i % 10}</div>`;
            }
            slot.innerHTML = nums;
        });

        function spin() {
            btn.disabled = true;

            // 1. 천의 자리 확률 설정 (1 또는 2가 50:50 확률)
            const thousandDigit = Math.random() < 0.5 ? 1 : 2;

            // 2. 나머지 백, 십, 일의 자리는 000~999 랜덤
            const rest = Math.floor(Math.random() * 1000).toString().padStart(3, '0');
            
            // 3. 만의 자리는 0으로 고정하여 "0[1or2][rest]" 형태 생성
            const resultAmount = "0" + thousandDigit.toString() + rest;
            const resultArr = resultAmount.split("");

            // 애니메이션 시작
            resultArr.forEach((digit, index) => {
                // 이전 결과 초기화 (필요시)
                slots[index].style.transition = 'none';
                slots[index].style.transform = 'translateY(0)';

                // 브라우저가 transition: none을 인식할 시간을 줌
                setTimeout(() => {
                    const targetDigit = parseInt(digit);
                    // 50번째 세트 위치로 이동하여 회전 느낌 극대화
                    const finalPosition = -((50 + targetDigit) * slotHeight);
                    
                    slots[index].style.transition = `transform ${2.5 + index * 0.6}s cubic-bezier(0.1, 0.45, 0.1, 1)`;
                    slots[index].style.transform = `translateY(${finalPosition}px)`;
                }, 50);
            });

            // 모든 애니메이션이 끝난 후 결과 알림
            setTimeout(() => {
                const finalValue = parseInt(resultAmount);
                alert(`🎉 축하합니다! ${finalValue.toLocaleString()}원에 당첨되셨습니다!`);
                btn.disabled = false;
            }, 6000);
        }

        btn.addEventListener('click', spin);
    </script>
</body>
</html>
