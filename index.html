<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Birthday Cash Roulette</title>
    <style>
        /* Gemini Dark Theme 스타일링 */
        body {
            background-color: #131314;
            color: #e3e3e3;
            font-family: 'Pretendard', sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
        }

        /* 텍스트 영역 */
        .header-section {
            text-align: center;
            margin-bottom: 40px;
        }

        .title {
            font-size: 3rem;
            font-weight: 700;
            margin: 0 0 15px 0;
            background: linear-gradient(90deg, #4285f4, #9b72cb, #d96570);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .subtitle {
            font-size: 1.1rem;
            color: #c4c7c5;
            line-height: 1.6;
        }

        .highlight {
            color: #8ab4f8;
            font-weight: bold;
        }

        /* 룰렛 슬롯 */
        .roulette-wrapper {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 50px;
        }

        .slot {
            width: 70px;
            height: 100px;
            background: #1e1f20;
            border: 1px solid #444746;
            border-radius: 12px;
            overflow: hidden;
            position: relative;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        .slot-inner {
            position: absolute;
            top: 0;
            width: 100%;
            transition: transform 0.1s; /* 초기화용 */
        }

        .num {
            height: 100px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 3.5rem;
            font-weight: 800;
            color: #8ab4f8;
        }

        .unit {
            font-size: 2rem;
            font-weight: 600;
            color: #e3e3e3;
            margin-left: 5px;
        }

        /* 버튼 */
        #drawBtn {
            padding: 18px 60px;
            font-size: 1.2rem;
            border-radius: 50px;
            border: none;
            background: #fff;
            color: #131314;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s;
            box-shadow: 0 0 20px rgba(138, 180, 248, 0.3);
        }

        #drawBtn:hover {
            transform: scale(1.05);
            box-shadow: 0 0 40px rgba(138, 180, 248, 0.5);
        }

        #drawBtn:disabled {
            background: #444746;
            color: #888;
            cursor: not-allowed;
            transform: none;
        }
    </style>
</head>
<body>

    <div class="header-section">
        <h1 class="title">생일 축하합니다</h1>
        <p class="subtitle">
            아래 뽑기 시작 버튼을 통해 돈을 뽑아보세요<br>
            한번 돌리신 후 <span class="highlight">엄태윤에게 디엠으로 사진을 발송</span> 하시면 됩니다
        </p>
    </div>

    <div class="roulette-wrapper">
        <div class="slot"><div id="s1" class="slot-inner"></div></div>
        <div class="slot"><div id="s2" class="slot-inner"></div></div>
        <div class="slot"><div id="s3" class="slot-inner"></div></div>
        <div class="slot"><div id="s4" class="slot-inner"></div></div>
        <div class="slot"><div id="s5" class="slot-inner"></div></div>
        <span class="unit">원</span>
    </div>

    <button id="drawBtn">뽑기 시작</button>

    <script>
        const slots = [
            document.getElementById('s1'),
            document.getElementById('s2'),
            document.getElementById('s3'),
            document.getElementById('s4'),
            document.getElementById('s5')
        ];
        const btn = document.getElementById('drawBtn');

        // 슬롯 초기화 (숫자 0-9를 여러 벌 미리 생성)
        slots.forEach(slot => {
            let nums = "";
            for (let i = 0; i < 50; i++) {
                nums += `<div class="num">${i % 10}</div>`;
            }
            slot.innerHTML = nums;
        });

        function spin() {
            btn.disabled = true;

            // 확률 계산 (0.1% 확률로 10004원, 나머지 1004원)
            const isJackpot = Math.random() < 0.001;
            const resultStr = isJackpot ? "10004" : "01004";
            const resultArr = resultStr.split("");

            // 냥코 룰렛 스타일: 왼쪽부터 순차적으로 정지
            resultArr.forEach((digit, index) => {
                setTimeout(() => {
                    const targetDigit = parseInt(digit);
                    // 40바퀴 정도 회전 후 해당 숫자에서 멈춤 (애니메이션)
                    const finalPosition = -((40 + targetDigit) * 100);
                    
                    slots[index].style.transition = `transform ${2 + index * 0.6}s cubic-bezier(0.15, 0, 0.15, 1)`;
                    slots[index].style.transform = `translateY(${finalPosition}px)`;
                }, index * 400); // 0.4초 간격으로 한 자리씩 멈추기 시작
            });

            // 모든 연출이 끝나면 알림
            setTimeout(() => {
                const finalWon = isJackpot ? "10,004" : "1,004";
                alert(`축하합니다! ${finalWon}원에 당첨되셨습니다!\n캡처해서 엄태윤님께 보내주세요!`);
            }, 5000);
        }

        btn.addEventListener('click', spin);
    </script>
</body>
</html>
